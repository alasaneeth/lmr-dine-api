# ─────────────────────────────────────────────────────────────────────────────
#  RMS – Production Nginx Config
#
#  This config puts the frontend (static files) and backend API on the SAME
#  origin, which is why the frontend can use relative URLs (/api/v1) and
#  why the refresh cookie (sameSite: lax) is sent without issues.
#
#  Deployment layout:
#    /var/www/rms/dist/        ← `npm run build` output (frontend)
#    backend running on :5000  ← Node.js process (PM2 / Docker)
#
#  To use:
#    1. Copy this file to /etc/nginx/sites-available/rms
#    2. ln -s /etc/nginx/sites-available/rms /etc/nginx/sites-enabled/rms
#    3. Replace YOUR_DOMAIN with your real domain
#    4. Run: certbot --nginx -d YOUR_DOMAIN   (Let's Encrypt TLS)
#    5. nginx -t && systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

upstream rms_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── TLS (managed by Certbot – do not edit these lines manually) ──────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Frontend static files ────────────────────────────────────────────────
    root  /var/www/rms/dist;
    index index.html;

    # Serve hashed assets with long cache; index.html must never be cached
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # SPA fallback – all non-asset, non-api paths serve index.html
    location / {
        add_header  Cache-Control "no-store";
        try_files   $uri $uri/ /index.html;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://rms_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Allow file uploads up to 6 MB (backend limit is 5 MB + envelope)
        client_max_body_size 6m;
    }

    # ── Uploaded static files ─────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass       http://rms_backend;
        proxy_set_header Host $host;
        expires          7d;
        add_header       Cache-Control "public";
    }

    # ── Socket.io (WebSocket + long-polling) ──────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://rms_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;   # keep WS alive for up to 24 h
        proxy_send_timeout 86400s;
    }
}
